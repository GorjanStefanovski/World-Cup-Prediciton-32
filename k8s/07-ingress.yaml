# Exposes the app at http://worldcup.local. nginx in the frontend pod proxies
# /api to the backend, so the Ingress only needs to route everything to the frontend.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: worldcup-ingress
  namespace: worldcup
spec:
  rules:
    - host: worldcup.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
