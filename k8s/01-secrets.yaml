# Sensitive value (DB password). stringData lets us write it in plain text;
# Kubernetes stores it base64-encoded. Referenced by both Postgres and the backend.
# (For a real deployment you would NOT commit this to git — fine for the demo.)
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: worldcup
type: Opaque
stringData:
  password: springpassword
