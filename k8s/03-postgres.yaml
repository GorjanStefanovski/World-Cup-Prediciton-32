# Headless Service: gives the StatefulSet a stable DNS name "postgres".
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: worldcup
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# StatefulSet for the database, with its own persistent volume.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: worldcup
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: db-config        # POSTGRES_DB, POSTGRES_USER
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            # Store data in a subdirectory so the volume's lost+found doesn't
            # confuse Postgres' "is this dir empty?" check on first boot.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "springuser", "-d", "football_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
