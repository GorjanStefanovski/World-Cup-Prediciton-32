# React app served by nginx (which also proxies /api to the backend Service).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: worldcup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gorjanstefanovski/worldcup-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: worldcup
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
