# Orchestrates the whole app: Postgres + ML service + Spring backend + nginx frontend.
# Service names (postgres, ml-service, backend) double as DNS hostnames on the
# compose network — that's how the env-var URLs below resolve.

services:
  postgres:
    image: postgres:15-alpine
    container_name: worldcup_db
    environment:
      POSTGRES_USER: springuser
      POSTGRES_PASSWORD: springpassword
      POSTGRES_DB: football_db
    ports:
      - "5433:5432"            # host 5433 -> container 5432 (avoids your local Postgres on 5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springuser -d football_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ml-service:
    build: ./ml-service
    container_name: worldcup_ml
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: worldcup_backend
    environment:
      # Internal container port is 5432 (NOT the published 5433).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/football_db
      SPRING_DATASOURCE_USERNAME: springuser
      SPRING_DATASOURCE_PASSWORD: springpassword
      FASTAPI_URL: http://ml-service:8000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy   # wait until the DB accepts connections
      ml-service:
        condition: service_healthy   # wait until the model is loaded
    restart: unless-stopped

  frontend:
    build: ./frontend/worldcup-frontend
    container_name: worldcup_frontend
    ports:
      - "3000:80"                # open http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
